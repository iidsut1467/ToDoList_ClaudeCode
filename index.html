<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDoリスト</title>
  <!-- 見た目（CSS）は別ファイルに分離 -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>ToDo リスト</h1>

    <!-- 入力フォーム：構造だけをHTMLで定義する -->
    <form id="todo-form" class="todo-form">
      <input
        id="todo-input"
        type="text"
        placeholder="やることを入力…"
        autocomplete="off"
        required>
      <button type="submit">追加</button>
      <!-- 詳細項目（すべて任意）。空のままでもOK -->
      <div class="fields">
        <label class="field">期限
          <input id="todo-due" type="date">
        </label>
        <label class="field">優先度
          <select id="todo-priority">
            <option value="high">高</option>
            <option value="mid" selected>中</option>
            <option value="low">低</option>
          </select>
        </label>
        <!-- 前提：まず「すぐ終わるか否か」を選ぶ -->
        <label class="field">すぐ終わる?
          <select id="todo-quick">
            <option value="yes">はい</option>
            <option value="no" selected>いいえ</option>
          </select>
        </label>

        <!-- 「いいえ」のときだけ表示する詳細（難度・所要時間） -->
        <div class="fields" id="detail-fields">
          <label class="field">難度
            <select id="todo-difficulty">
              <option value="easy">易しい</option>
              <option value="normal" selected>普通</option>
              <option value="hard">難しい</option>
            </select>
          </label>
          <label class="field">所要時間
            <input id="todo-estimate" type="number" min="0" step="1" placeholder="例: 30">
            <select id="todo-estimate-unit">
              <option value="min" selected>分</option>
              <option value="hour">時間</option>
              <option value="day">日</option>
            </select>
          </label>
        </div>
      </div>
    </form>

    <!-- 一覧は表で表示。中身(tbody)はJavaScriptが動的に埋める -->
    <table id="todo-table" class="todo-table">
      <thead>
        <tr>
          <th class="col-check">完了</th>
          <th class="col-text">やること</th>
          <th>期限</th>
          <th>優先度</th>
          <th>難度／区分</th>
          <th>所要時間</th>
          <th class="col-actions">操作</th>
        </tr>
      </thead>
      <tbody id="todo-list"></tbody>
    </table>

    <p id="empty-message" class="empty-message">まだ項目がありません。</p>
  </main>

  <!-- 動き（JavaScript）も別ファイルに分離。defer＝HTML読込後に実行 -->
  <script src="app.js" defer></script>
</body>
</html>
